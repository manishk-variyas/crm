# CRM Microfrontend Nginx Configuration
# Sub-path routing approach for Module Federation
# 
# Architecture:
# - Shell (port 80) - Main host application
# - Main MFE (remote) - All CRM pages
# - Auth MFE (remote) - Login page
#
# URLs:
# https://crm.company.com/          -> Shell / Redirects to dashboard
# https://crm.company.com/login     -> Auth MFE
# https://crm.company.com/dashboard -> Main MFE
# https://crm.company.com/*          -> Main MFE (all other pages)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss application/json;

    # Upstream services
    upstream shell {
        server shell:80;
    }

    upstream main {
        server main:3001;
    }

    upstream auth {
        server auth:3002;
    }

    # Main server block
    server {
        listen 80;
        server_name crm.company.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Shell application - serves the main React app
        location / {
            proxy_pass http://shell;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Increase timeouts for React apps
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Module Federation remote entries
        # These are loaded by the shell at runtime
        location /main/remoteEntry.js {
            proxy_pass http://main/remoteEntry.js;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache the remote entry for performance
            add_header Cache-Control "public, max-age=300";
        }

        location /auth/remoteEntry.js {
            proxy_pass http://auth/remoteEntry.js;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Cache-Control "public, max-age=300";
        }

        # Static assets from remotes
        location /main/assets/ {
            proxy_pass http://main/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Long cache for hashed assets
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /auth/assets/ {
            proxy_pass http://auth/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fallback for SPA routing - all routes go to shell
        location / {
            proxy_pass http://shell;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
