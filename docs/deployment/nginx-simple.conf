# CRM Microfrontend Nginx Configuration
# Simple deployment without Docker - serves built files directly
#
# Build first:
# pnpm build
#
# Then copy dist folders to respective locations:
# - apps/shell/dist -> /var/www/crm-shell
# - apps/main/dist  -> /var/www/crm-main  
# - apps/auth/dist  -> /var/www/crm-auth
#
# URLs:
# https://crm.company.com/          -> Shell
# https://crm.company.com/login     -> Auth
# https://crm.company.com/dashboard -> Main

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss application/json;

    # Server
    server {
        listen 80;
        server_name crm.company.com;

        # Root directories (build outputs)
        root /var/www/crm-shell/dist;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ============================================
        # LOGIN ROUTE -> Auth MFE
        # ============================================
        location /login {
            # Serve auth app
            alias /var/www/crm-auth/dist;
            try_files /index.html =404;
            
            # Cache HTML - no cache for SPA
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ============================================
        # MAIN MFE -> All other routes
        # ============================================
        location / {
            try_files /index.html =404;
            
            # Update Module Federation URLs to point to main assets
            sub_filter_once on;
            sub_filter 'localhost:3001' 'crm.company.com/main';
            sub_filter 'localhost:3002' 'crm.company.com/auth';
            
            # No cache for SPA
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ============================================
        # Module Federation Assets for Main MFE
        # ============================================
        location /main/ {
            alias /var/www/crm-main/dist/;
            try_files $uri =404;
            
            # Cache hashed assets
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ============================================
        # Module Federation Assets for Auth MFE  
        # ============================================
        location /auth/ {
            alias /var/www/crm-auth/dist/;
            try_files $uri =404;
            
            # Cache hashed assets
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ============================================
        # Static Assets (JS, CSS, Images)
        # ============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
